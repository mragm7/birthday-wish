<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday to My Best Friend 💕</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffeef8 0%, #ffe0ec 50%, #ffd4e5 100%);
            min-height: 100vh;
            overflow: hidden;
            color: #d91e63;
        }

        .container {
            width: 100%;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }

        .floating-hearts {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
        }

        .heart {
            position: absolute;
            font-size: 2rem;
            opacity: 0.6;
            animation: float-up 6s infinite ease-in;
        }

        @keyframes float-up {
            0% {
                opacity: 0;
                transform: translateY(100vh) translateX(0);
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                opacity: 0;
                transform: translateY(-100vh) translateX(100px);
            }
        }

        .page {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transform: translateX(100%);
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 10;
            padding: 20px;
        }

        .page.active {
            opacity: 1;
            transform: translateX(0);
            z-index: 20;
        }

        .content-wrapper {
            width: 100%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(217, 30, 99, 0.15);
            text-align: center;
            animation: slideIn 0.8s ease-out;
            backdrop-filter: blur(10px);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: scale(0.8) translateY(30px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .title {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #d91e63, #ff1744);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            animation: bounce 1s ease-in-out;
        }

        .subtitle {
            font-size: 1.5rem;
            color: #d91e63;
            margin-bottom: 30px;
            font-weight: 600;
            animation: fadeIn 1.2s ease-out;
        }

        .page-title {
            font-size: 2.5rem;
            color: #d91e63;
            margin-bottom: 30px;
            font-weight: 700;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-15px);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .name-input-container {
            position: relative;
            margin: 30px 0;
        }

        .name-input {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.2rem;
            border: 2px solid #ffb6d9;
            border-radius: 20px;
            background: linear-gradient(135deg, #fff5f9, #ffebf2);
            color: #d91e63;
            transition: all 0.3s ease;
            text-align: center;
        }

        .name-input::placeholder {
            color: #ffb6d9;
        }

        .name-input:focus {
            outline: none;
            border-color: #d91e63;
            box-shadow: 0 0 20px rgba(217, 30, 99, 0.3);
            transform: scale(1.02);
        }

        .input-decoration {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.5rem;
            animation: spin 3s linear infinite;
        }

        @keyframes spin {
            0% { transform: translateY(-50%) rotate(0deg); }
            100% { transform: translateY(-50%) rotate(360deg); }
        }

        .decorative-hearts {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            font-size: 2rem;
        }

        .decorative-hearts span {
            animation: pulse 1.5s ease-in-out infinite;
        }

        .decorative-hearts span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .decorative-hearts span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.3);
            }
        }

        .btn {
            padding: 12px 40px;
            font-size: 1.1rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(217, 30, 99, 0.2);
            margin-top: 15px;
        }

        .btn-next,
        .btn-yes {
            background: linear-gradient(135deg, #d91e63, #ff1744);
            color: white;
        }

        .btn-next:hover,
        .btn-yes:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(217, 30, 99, 0.4);
        }

        .btn-next:active,
        .btn-yes:active {
            transform: translateY(-1px);
        }

        .btn-no {
            background: #f5f5f5;
            color: #d91e63;
            border: 2px solid #ffb6d9;
            position: relative;
        }

        .btn-no:hover {
            background: #ffebf2;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 25px;
        }

        .btn-back {
            background: #f0f0f0;
            color: #d91e63;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .btn-back:hover {
            background: #ffebf2;
        }

        .nav-buttons {
            text-align: center;
            margin-top: 20px;
        }

        .love-message {
            background: linear-gradient(135deg, #fff5f9, #ffebf2);
            padding: 25px;
            border-radius: 20px;
            margin: 25px 0;
            border: 2px solid #ffb6d9;
        }

        .message-text {
            font-size: 1.2rem;
            color: #d91e63;
            line-height: 1.8;
            margin-bottom: 15px;
        }

        .heart-animation {
            font-size: 3rem;
            animation: heartBeat 1s ease-in-out infinite;
        }

        @keyframes heartBeat {
            0%, 100% {
                transform: scale(1);
            }
            25% {
                transform: scale(1.2);
            }
            50% {
                transform: scale(1);
            }
        }

        .question-container {
            margin: 30px 0;
        }

        .question {
            font-size: 1.3rem;
            color: #d91e63;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .reasons-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin: 25px 0;
        }

        .reason-card {
            background: linear-gradient(135deg, #fff5f9, #ffebf2);
            padding: 20px;
            border-radius: 15px;
            border: 2px solid #ffb6d9;
            position: relative;
            animation: slideUp 0.6s ease-out;
            transition: all 0.3s ease;
        }

        .reason-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(217, 30, 99, 0.2);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .reason-number {
            display: inline-block;
            width: 35px;
            height: 35px;
            background: linear-gradient(135deg, #d91e63, #ff1744);
            color: white;
            border-radius: 50%;
            font-weight: 700;
            line-height: 35px;
            margin-bottom: 10px;
        }

        .reason-text {
            font-size: 1.1rem;
            color: #d91e63;
            margin: 10px 0;
            font-weight: 500;
        }

        .heart-icon {
            font-size: 1.5rem;
            display: block;
            margin-top: 10px;
            animation: swing 2s ease-in-out infinite;
        }

        @keyframes swing {
            0%, 100% {
                transform: rotate(-5deg);
            }
            50% {
                transform: rotate(5deg);
            }
        }

        .cake-container {
            margin: 30px 0;
            height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .cake {
            position: relative;
            width: 150px;
            height: 150px;
            animation: cakeFloat 3s ease-in-out infinite;
        }

        @keyframes cakeFloat {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        .candle {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            width: 3px;
            height: 30px;
            background: #f4d4a8;
            border-radius: 2px;
            z-index: 2;
        }

        .candle-flame {
            position: absolute;
            bottom: 130px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 20px;
            background: linear-gradient(to top, #ff6b00, #ffd700, #ffff00);
            border-radius: 50% 50% 50% 0;
            animation: flame 0.3s ease-in-out infinite;
            z-index: 3;
        }

        @keyframes flame {
            0%, 100% {
                transform: translateX(-50%) scaleY(1);
            }
            50% {
                transform: translateX(-50%) scaleY(0.9);
            }
        }

        .cake-body {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .layer {
            position: absolute;
            width: 100%;
            height: 30px;
            border-radius: 10px;
        }

        .layer-top {
            background: linear-gradient(135deg, #ff69b4, #ff1493);
            bottom: 70px;
            width: 70%;
            left: 15%;
        }

        .layer-middle {
            background: linear-gradient(135deg, #ff1493, #db1a7c);
            bottom: 40px;
            width: 85%;
            left: 7.5%;
        }

        .layer-bottom {
            background: linear-gradient(135deg, #db1a7c, #c71585);
            bottom: 0;
            width: 100%;
        }

        .wish-section {
            margin: 20px 0;
        }

        .wish-text {
            font-size: 1.2rem;
            color: #d91e63;
            font-weight: 600;
            margin: 10px 0;
        }

        .wish-instruction {
            font-size: 1rem;
            color: #ff1744;
            animation: blink 1.5s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .candle-flame.extinguished {
            animation: none;
            opacity: 0;
        }

        .celebration-container {
            position: relative;
            margin: 30px 0;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .final-message {
            animation: celebrateScale 0.8s ease-out;
        }

        @keyframes celebrateScale {
            0% {
                opacity: 0;
                transform: scale(0);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .final-text {
            font-size: 1.5rem;
            color: #d91e63;
            margin: 10px 0;
            animation: fadeIn 0.8s ease-out;
        }

        .final-text.large {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #d91e63, #ff1744);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .gift-box-animation {
            margin: 20px 0;
            animation: bounce 1s ease-in-out infinite;
        }

        .gift-box {
            position: relative;
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #ff1744, #d91e63);
            border-radius: 10px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            box-shadow: 0 10px 25px rgba(217, 30, 99, 0.3);
        }

        .ribbon {
            position: absolute;
            width: 100%;
            height: 20px;
            background: linear-gradient(90deg, #ffd700, #ffed4e, #ffd700);
            top: 40%;
            border-radius: 10px;
            z-index: 2;
        }

        .box-content {
            z-index: 3;
        }

        .final-message-box {
            background: linear-gradient(135deg, #fff5f9, #ffebf2);
            padding: 20px;
            border-radius: 15px;
            border: 2px solid #ffb6d9;
            margin: 25px 0;
        }

        #customWish {
            font-size: 1.1rem;
            color: #d91e63;
            font-style: italic;
            line-height: 1.6;
        }

        .final-buttons {
            margin-top: 30px;
        }

        .btn-restart {
            background: linear-gradient(135deg, #d91e63, #ff1744);
            color: white;
            padding: 12px 40px;
            font-size: 1.1rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(217, 30, 99, 0.2);
        }

        .btn-restart:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(217, 30, 99, 0.4);
        }

        .confetti-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            pointer-events: none;
        }

        .celebrate-title {
            animation: titlePulse 0.8s ease-in-out;
        }

        @keyframes titlePulse {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .title {
                font-size: 2.5rem;
            }

            .page-title {
                font-size: 2rem;
            }

            .content-wrapper {
                padding: 30px 20px;
                border-radius: 20px;
            }

            .message-text {
                font-size: 1rem;
            }

            .reason-card {
                padding: 15px;
            }

            .btn {
                padding: 10px 30px;
                font-size: 1rem;
            }

            .decorative-hearts {
                font-size: 1.5rem;
            }

            .final-text {
                font-size: 1.2rem;
            }

            .final-text.large {
                font-size: 1.5rem;
            }
        }

        @media (max-width: 480px) {
            .title {
                font-size: 2rem;
            }

            .subtitle {
                font-size: 1.2rem;
            }

            .page-title {
                font-size: 1.5rem;
            }

            .content-wrapper {
                padding: 20px 15px;
                max-width: 90%;
            }

            .message-text {
                font-size: 0.95rem;
            }

            .question {
                font-size: 1.1rem;
            }

            .btn {
                padding: 10px 20px;
                font-size: 0.95rem;
                margin-top: 10px;
            }

            .button-group {
                flex-direction: column;
                gap: 10px;
            }

            .name-input {
                font-size: 1rem;
                padding: 12px 15px;
            }

            .cake {
                width: 120px;
                height: 120px;
            }

            .reason-card {
                padding: 12px;
            }

            .reason-text {
                font-size: 1rem;
            }

            .final-text {
                font-size: 1rem;
            }

            .final-text.large {
                font-size: 1.3rem;
            }

            .heart-animation {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Background Elements -->
        <div class="floating-hearts"></div>

        <!-- Page 1: Name Input -->
        <div class="page page-1 active">
            <div class="content-wrapper">
                <h1 class="title">Happy Birthday! 💕</h1>
                <div class="subtitle">To My Best Friend</div>
                
                <div class="name-input-container">
                    <input type="text" id="nameInput" class="name-input" placeholder="Enter Your Name Here...">
                    <div class="input-decoration">✨</div>
                </div>

                <button class="btn btn-next" onclick="goToPage2()">
                    Continue →
                </button>

                <div class="decorative-hearts">
                    <span>💖</span>
                    <span>💗</span>
                    <span>💕</span>
                </div>
            </div>
        </div>

        <!-- Page 2: Main Message -->
        <div class="page page-2">
            <div class="content-wrapper">
                <h2 class="page-title" id="friendName">Dear Friend</h2>
                <div class="love-message">
                    <p class="message-text">
                        Today is your special day, and I want
